<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Quiniela · 8vos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0f0a;color:#e8f5e9;min-height:100vh;padding-bottom:70px}
header{background:#0d1f0d;border-bottom:2px solid #00C853;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:700;color:#00C853}.logo span{color:#FFD600}
.sync-btn{background:#00C853;color:#000;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.status{background:#111;padding:8px 16px;font-size:12px;color:#6b8f6b;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a3a2a}
.dot{width:8px;height:8px;border-radius:50%;background:#00C853;flex-shrink:0}
.dot.err{background:#FF1744}.dot.spin{background:#FFD600;animation:blink 0.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.filters{display:flex;overflow-x:auto;padding:10px 16px;gap:8px;background:#0a0f0a;border-bottom:1px solid #2a3a2a;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid #2a3a2a;background:transparent;color:#6b8f6b;cursor:pointer}
.ftab.on{background:#00C853;color:#000;border-color:#00C853}
.list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.card{background:#1a231a;border:1px solid #2a3a2a;border-radius:14px;overflow:hidden}
.card.live{border-color:#FF1744;box-shadow:0 0 10px rgba(255,23,68,0.2)}
.card.done{border-color:rgba(0,200,83,0.35)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.03);border-bottom:1px solid #2a3a2a}
.card-num{font-size:11px;color:#6b8f6b;font-weight:600}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px}
.b-live{background:rgba(255,23,68,0.2);color:#FF1744}
.b-done{background:rgba(0,200,83,0.15);color:#00C853}
.b-soon{background:rgba(255,214,0,0.15);color:#FFD600}
.card-body{padding:12px 14px}
.teams{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tname{flex:1;font-size:14px;font-weight:600;text-align:center}
.vs{font-size:11px;color:#6b8f6b;font-weight:700;flex-shrink:0}
.score-row{display:flex;align-items:center;justify-content:center;gap:10px}
.sinput{width:58px;height:58px;border-radius:12px;text-align:center;font-size:26px;font-weight:700;background:#0d1a0d;border:2px solid #2a3a2a;color:#00C853;outline:none;-webkit-appearance:none;appearance:none}
.sinput:focus{border-color:#00C853}
.ssep{font-size:22px;font-weight:700;color:#6b8f6b}
.save-btn{width:100%;margin-top:12px;padding:13px;border-radius:10px;background:#00C853;color:#000;border:none;font-size:15px;font-weight:700;cursor:pointer}
.save-btn.sending{background:#FFD600}
.saved-sc{text-align:center;padding:8px;font-size:24px;font-weight:700;color:#00C853;letter-spacing:3px}
.edit-btn{width:100%;margin-top:8px;padding:8px;border-radius:10px;background:transparent;color:#6b8f6b;border:1px solid #2a3a2a;font-size:13px;cursor:pointer}
.empty{text-align:center;padding:40px;color:#6b8f6b;font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#00C853;color:#000;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:700;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#FF1744;color:#fff}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#0d1a0d;border-top:1px solid #2a3a2a;display:flex;padding:8px 16px 16px;gap:8px}
.nbtn{flex:1;padding:10px;border-radius:10px;border:1px solid #2a3a2a;background:transparent;color:#6b8f6b;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center}
.modal-box{background:#1a231a;border:1px solid #00C853;border-radius:16px;padding:24px;width:90%;max-width:380px}
.modal-title{font-size:16px;font-weight:700;color:#00C853;margin-bottom:16px}
.modal-label{font-size:12px;color:#6b8f6b;display:block;margin-bottom:6px}
.modal-select{width:100%;padding:10px;background:#0d1a0d;border:1px solid #2a3a2a;border-radius:8px;color:#e8f5e9;font-size:14px;margin-bottom:12px}
.modal-input{width:100%;padding:12px;background:#0d1a0d;border:2px solid #2a3a2a;border-radius:8px;color:#00C853;font-size:24px;font-weight:700;text-align:center;outline:none;margin-bottom:8px}
.modal-input:focus{border-color:#00C853}
.modal-info{font-size:11px;color:#6b8f6b;margin-bottom:16px;min-height:16px}
.modal-btns{display:flex;gap:8px}
.modal-btn-cancel{flex:1;padding:12px;border-radius:8px;background:transparent;border:1px solid #2a3a2a;color:#6b8f6b;font-size:14px;cursor:pointer}
.modal-btn-save{flex:1;padding:12px;border-radius:8px;background:#00C853;color:#000;border:none;font-size:14px;font-weight:700;cursor:pointer}
.jugadores-lista{display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto;margin-bottom:16px}
.jug-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#0d1a0d;border-radius:8px;border:1px solid #2a3a2a}
.jug-nombre{font-size:14px;font-weight:600}
.jug-pts{font-size:18px;font-weight:700;color:#FFD600}
.jug-pts.neg{color:#FF1744}.jug-pts.zero{color:#6b8f6b}
.jug-edit{padding:4px 12px;border-radius:6px;background:transparent;border:1px solid #2a3a2a;color:#6b8f6b;font-size:12px;cursor:pointer}
.avance-box{margin-top:12px;padding:10px;border-radius:10px;background:#0d1a0d;border:1px dashed #2a3a2a}
.avance-label{font-size:11px;color:#6b8f6b;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.avance-btns{display:flex;gap:8px}
.avance-btn{flex:1;padding:10px 6px;border-radius:8px;background:transparent;border:1px solid #2a3a2a;color:#e8f5e9;font-size:13px;font-weight:600;cursor:pointer}
.avance-btn.sel{background:#00C853;color:#000;border-color:#00C853}
.avance-actual{font-size:11px;color:#FFD600;margin-top:8px;text-align:center}
</style>
</head>
<body>
<header>
  <div class="logo">ADMIN <span>8VOS</span></div>
  <button class="sync-btn" onclick="syncAll()">Sincronizar todo</button>
</header>
<div class="status"><div class="dot" id="dot"></div><span id="stxt">Cargando...</span></div>
<div class="filters">
  <button class="ftab on" onclick="setFilter('all',this)">Todos</button>
  <button class="ftab" onclick="setFilter('pending',this)">Pendientes</button>
  <button class="ftab" onclick="setFilter('live',this)">En vivo</button>
  <button class="ftab" onclick="setFilter('done',this)">Finalizados</button>
</div>
<div class="list" id="list"></div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-lista">
  <div class="modal-box" style="max-height:80vh;overflow-y:auto">
    <div class="modal-title">⚖️ Penalizaciones / Bonos</div>
    <div class="jugadores-lista" id="lista-ajustes"></div>
    <div style="display:flex;gap:8px">
      <button class="modal-btn-cancel" onclick="cerrarModal('modal-lista')">Cerrar</button>
      <button class="modal-btn-save" onclick="abrirAjusteIndividual()">+ Nuevo ajuste</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-ajuste">
  <div class="modal-box">
    <div class="modal-title">⚖️ Ajuste de Puntos</div>
    <label class="modal-label">Participante</label>
    <select class="modal-select" id="sel-jugador" onchange="onJugadorChange()">
      <option value="">Seleccionar...</option>
      <option>Olguin</option><option>Pedro</option><option>Luis</option>
      <option>Rafa</option><option>Alonso</option><option>Vanessa</option>
      <option>Espino</option><option>Papa Espino</option><option>Said</option>
      <option>Cesar</option><option>Noe</option><option>Don Jorge</option>
      <option>Maluma</option><option>Alex</option><option>Hazael</option>
      <option>Gamez</option><option>Alejandra</option><option>Lic Dominguez</option>
      <option>Ray</option><option>Jesus</option>
    </select>
    <label class="modal-label">Puntos (negativo = penalización)</label>
    <input class="modal-input" type="number" id="inp-ajuste" placeholder="ej: -2">
    <div class="modal-info" id="info-ajuste">Sin ajuste previo</div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="cerrarModal('modal-ajuste')">Cancelar</button>
      <button class="modal-btn-save" onclick="guardarAjuste()">Guardar</button>
    </div>
  </div>
</div>

<div class="bottom">
  <button class="nbtn" onclick="setFilter('all',this)">Partidos</button>
  <button class="nbtn" onclick="abrirLista()">⚖️ Puntos</button>
  <button class="nbtn" onclick="exportar()">Compartir</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmhRq7q-L88iAdPva9X5FIej1vStWn7GUKgBMfJ1_8t2YI9mRdBGO2-Xxjyfp7J2dc/exec';
const DUR = 115 * 60 * 1000;
let filter = 'all';
let ajustesActuales = {};
let avances = {};
const JUGADORES_LISTA = ['Olguin','Pedro','Luis','Rafa','Alonso','Vanessa','Espino','Papa Espino','Said','Cesar','Noe','Don Jorge','Maluma','Alex','Hazael','Gamez','Alejandra','Lic Dominguez','Ray','Jesus'];

// ===== SOLO 8VOS =====
// Los 16vos ya se jugaron: aquí los equipos van directos con su nombre real.
// idx conserva la numeración original (200-207) para no perder resultados ya guardados en el Sheet.
const partidos = [
  {id:200, l:'Paraguay',  v:'Francia',    k:'2026-07-04T22:00:00Z'},
  {id:201, l:'Canada',    v:'Marruecos',  k:'2026-07-04T18:00:00Z'},
  {id:202, l:'Portugal',  v:'España',     k:'2026-07-07T20:00:00Z'},
  {id:203, l:'USA',       v:'Belgica',    k:'2026-07-07T01:00:00Z'},
  {id:204, l:'Brasil',    v:'Noruega',    k:'2026-07-05T21:00:00Z'},
  {id:205, l:'Mexico',    v:'Inglaterra', k:'2026-07-06T01:00:00Z'},
  {id:206, l:'Argentina', v:'Egipto',     k:'2026-07-07T17:00:00Z'},
  {id:207, l:'Suiza',     v:'Colombia',   k:'2026-07-07T20:00:00Z'},
];

let local = JSON.parse(localStorage.getItem('adm_res') || '{}');

function getState(p) {
  const now=Date.now(), kick=new Date(p.k).getTime(), end=kick+DUR;
  const res=local[p.id]!==undefined?local[p.id]:null;
  if (res) return {s:'done',res};
  if (now>=kick&&now<end) return {s:'live',min:Math.floor((now-kick)/60000)};
  if (now<kick) return {s:'soon',kick};
  return {s:'soon',kick};
}

function labelPartido(p) { return '8vo · '+p.l+' vs '+p.v; }

function setAvance(id,equipo){
  avances[String(id)]=equipo;
  const url=SCRIPT_URL+'?action=saveAvance&idx='+id+'&equipo='+encodeURIComponent(equipo);
  fetch(url,{mode:'no-cors'}); new Image().src=url;
  toast(equipo+' avanza a Cuartos ✔ guardado');
  render();
}

function avanceHtml(p) {
  const actual = avances[String(p.id)] || '';
  return '<div class="avance-box"><div class="avance-label">¿Quién avanza a Cuartos?</div>'
    +'<div class="avance-btns">'
    +'<button class="avance-btn'+(actual===p.l?' sel':'')+'" onclick="setAvance('+p.id+',\''+p.l.replace(/'/g,"\\'")+'\')">'+p.l+'</button>'
    +'<button class="avance-btn'+(actual===p.v?' sel':'')+'" onclick="setAvance('+p.id+',\''+p.v.replace(/'/g,"\\'")+'\')">'+p.v+'</button>'
    +'</div>'
    +(actual?'<div class="avance-actual">Avanza: '+actual+'</div>':'')
    +'</div>';
}

function render() {
  const c=document.getElementById('list');
  const list=partidos.filter(function(p){
    const st=getState(p);
    if (filter==='pending') return st.s==='soon';
    if (filter==='live') return st.s==='live';
    if (filter==='done') return st.s==='done';
    return true;
  });
  if (!list.length){c.innerHTML='<div class="empty">Sin partidos en esta categoría</div>';return;}
  c.innerHTML=list.map(function(p){
    const st=getState(p);
    const editable=Date.now()>=new Date(p.k).getTime();
    let badge='',cardCls='';
    if (st.s==='live'){badge='<div class="badge b-live">EN VIVO '+st.min+"'</div>";cardCls='live';}
    else if (st.s==='done'){badge='<div class="badge b-done">FINALIZADO</div>';cardCls='done';}
    else{const kd=new Date(p.k);badge='<div class="badge b-soon">'+kd.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',timeZone:'America/Tijuana'})+' '+kd.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tijuana'})+' PDT</div>';}
    let body='';
    if (st.res){
      body='<div class="saved-sc">'+st.res[0]+' — '+st.res[1]+'</div>';
      if (editable) body+='<button class="edit-btn" onclick="edit('+p.id+')">Cambiar resultado</button>';
    } else if (editable){
      body='<div class="score-row">'
        +'<input class="sinput" type="number" min="0" max="20" id="l'+p.id+'" placeholder="0">'
        +'<span class="ssep">-</span>'
        +'<input class="sinput" type="number" min="0" max="20" id="v'+p.id+'" placeholder="0">'
        +'</div>'
        +'<button class="save-btn" id="btn'+p.id+'" onclick="save('+p.id+')">Guardar resultado</button>';
    } else {
      const kd=new Date(p.k);
      body='<div style="text-align:center;padding:12px;color:#FFD600;font-size:13px">Inicia el '+kd.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',timeZone:'America/Tijuana'})+' a las '+kd.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tijuana'})+' PDT</div>';
    }
    return '<div class="card '+cardCls+'">'
      +'<div class="card-head"><div class="card-num">'+labelPartido(p)+'</div>'+badge+'</div>'
      +'<div class="card-body"><div class="teams"><div class="tname">'+p.l+'</div><div class="vs">VS</div><div class="tname">'+p.v+'</div></div>'+body+avanceHtml(p)+'</div></div>';
  }).join('');
}

function save(id) {
  const lv=parseInt(document.getElementById('l'+id)?.value);
  const vv=parseInt(document.getElementById('v'+id)?.value);
  if(isNaN(lv)||isNaN(vv)){toast('Ingresa los dos goles',true);return;}
  const btn=document.getElementById('btn'+id);
  if(btn){btn.textContent='Enviando...';btn.classList.add('sending');}
  local[id]=[lv,vv];
  localStorage.setItem('adm_res',JSON.stringify(local));
  const p=partidos.find(function(p){return p.id===id;});
  sendToSheet(id,lv,vv,p.l,p.v);
  setTimeout(function(){toast(labelPartido(p)+': '+lv+'-'+vv+' guardado');render();},600);
}

function edit(id) {
  const prev=local[id];
  delete local[id];
  localStorage.setItem('adm_res',JSON.stringify(local));
  render();
  if (prev){
    setTimeout(function(){
      const lI=document.getElementById('l'+id),vI=document.getElementById('v'+id);
      if(lI) lI.value=prev[0]; if(vI) vI.value=prev[1];
    },100);
  }
}

function sendToSheet(id,l,v,lNom,vNom){
  const params='?action=save&idx='+id+'&partido='+encodeURIComponent((lNom||'?')+' vs '+(vNom||'?'))+'&local='+l+'&visita='+v;
  const url=SCRIPT_URL+params;
  fetch(url,{mode:'no-cors'}).then(function(){setStatus('Guardado',false);}).catch(function(){setStatus('Sin conexion',true);});
  new Image().src=url;
}

async function syncAll(){
  setStatus('Sincronizando...',false,true);
  let i=0;
  for(const[id,res] of Object.entries(local)){
    const p=partidos.find(function(p){return p.id===parseInt(id);});
    if(p) sendToSheet(parseInt(id),res[0],res[1],p.l,p.v);
    await new Promise(function(r){setTimeout(r,400);}); i++;
  }
  toast('Sincronizados '+i+' resultados');
  setStatus('Listo',false);
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.ftab,.nbtn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on'); render();
}
function setStatus(msg,err,loading){
  const d=document.getElementById('dot'),t=document.getElementById('stxt');
  d.className='dot'+(err?' err':loading?' spin':''); t.textContent=msg;
}
function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'')+' show';
  setTimeout(function(){t.className='toast'+(err?' err':'');},2500);
}
function exportar(){
  let txt='QUINIELA MUNDIAL 2026 · 8VOS\n\n';
  partidos.forEach(function(p){const r=local[p.id];txt+=p.l+' vs '+p.v+': '+(r?r[0]+'-'+r[1]:'Pendiente')+(avances[String(p.id)]?' (avanza: '+avances[String(p.id)]+')':'')+'\n';});
  if(navigator.share) navigator.share({text:txt});
  else if(navigator.clipboard) navigator.clipboard.writeText(txt).then(function(){toast('Copiado');});
}

async function syncFromSheet(){
  try{
    const r=await fetch(SCRIPT_URL+'?t='+Date.now(),{cache:'no-store'});
    const data=await r.json();
    let changed=false;
    for(const[idx,res] of Object.entries(data)){
      const id=parseInt(idx);
      if(!isNaN(id)&&Array.isArray(res)&&partidos.some(function(p){return p.id===id;})){
        local[id]=res;
        changed=true;
      }
    }
    if(changed){localStorage.setItem('adm_res',JSON.stringify(local));render();}
    setStatus('Listo',false);
  }catch(e){setStatus('Sin conexion',true);}
}

async function cargarAvances(){
  try{const r=await fetch(SCRIPT_URL+'?action=getAvances&t='+Date.now());avances=await r.json();}
  catch(e){avances={};}
}

// ===== AJUSTES =====
async function cargarAjustes(){
  try{const r=await fetch(SCRIPT_URL+'?action=getAjustes&t='+Date.now());ajustesActuales=await r.json();}
  catch(e){ajustesActuales={};}
}
function abrirLista(){renderListaAjustes();document.getElementById('modal-lista').style.display='flex';}
function renderListaAjustes(){
  document.getElementById('lista-ajustes').innerHTML=JUGADORES_LISTA.map(function(nombre){
    const pts=ajustesActuales[nombre]||0,cls=pts>0?'':pts<0?'neg':'zero';
    return '<div class="jug-row"><span class="jug-nombre">'+nombre+'</span><div style="display:flex;align-items:center;gap:8px"><span class="jug-pts '+cls+'">'+(pts>0?'+':'')+pts+'</span><button class="jug-edit" onclick="editarJugador(\''+nombre+'\')">Editar</button></div></div>';
  }).join('');
}
function editarJugador(nombre){cerrarModal('modal-lista');document.getElementById('sel-jugador').value=nombre;onJugadorChange();document.getElementById('modal-ajuste').style.display='flex';}
function abrirAjusteIndividual(){cerrarModal('modal-lista');document.getElementById('sel-jugador').value='';document.getElementById('inp-ajuste').value='';document.getElementById('info-ajuste').textContent='Sin ajuste previo';document.getElementById('modal-ajuste').style.display='flex';}
function onJugadorChange(){
  const nombre=document.getElementById('sel-jugador').value,info=document.getElementById('info-ajuste');
  if(nombre&&ajustesActuales[nombre]&&ajustesActuales[nombre]!==0){const val=ajustesActuales[nombre];info.textContent='Ajuste actual: '+(val>0?'+':'')+val+' pts';document.getElementById('inp-ajuste').value=val;}
  else{info.textContent='Sin ajuste previo';document.getElementById('inp-ajuste').value='';}
}
async function guardarAjuste(){
  const nombre=document.getElementById('sel-jugador').value,ajuste=parseInt(document.getElementById('inp-ajuste').value);
  if(!nombre){toast('Selecciona un participante',true);return;}
  if(isNaN(ajuste)){toast('Ingresa un número válido',true);return;}
  const url=SCRIPT_URL+'?action=saveAjuste&nombre='+encodeURIComponent(nombre)+'&ajuste='+ajuste;
  fetch(url,{mode:'no-cors'});new Image().src=url;
  ajustesActuales[nombre]=ajuste;
  toast(nombre+': '+(ajuste>=0?'+':'')+ajuste+' pts guardado');
  cerrarModal('modal-ajuste');
}
function cerrarModal(id){document.getElementById(id).style.display='none';}

// ===== INIT =====
syncFromSheet().then(function(){render();});
cargarAjustes();
cargarAvances().then(function(){render();});
setInterval(syncFromSheet,30000);
setInterval(function(){cargarAvances().then(render);},20000);
</script>
</body>
</html>
