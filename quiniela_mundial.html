// ===== GANADORES =====
function ganador16(idx16) {
  const res = resNuevas[String(idx16)]; if (!res) return null;
  const p = partidos16.find(function(p){return p.idx===idx16;}); if (!p) return null;
  return res[0]>res[1]?p.l:p.v;
}
function ganador8(idx8) {
  const res = resNuevas[String(idx8)]; if (!res) return null;
  const p = partidos8.find(function(p){return p.idx===idx8;}); if (!p) return null;
  const lN=ganador16(p.p16a), vN=ganador16(p.p16b);
  if (!lN||!vN) return null;
  return res[0]>res[1]?lN:vN;
}
function ganadorCuarto(idx) {
  const res = resNuevas[String(idx)]; if (!res) return null;
  const p = partidosCuartos.find(function(p){return p.idx===idx;}); if (!p) return null;
  const lN=ganador8(p.p8a), vN=ganador8(p.p8b);
  if (!lN||!vN) return null;
  return res[0]>res[1]?lN:vN;
}
function nombreEq8(p8, lado) { return ganador16(lado==='l'?p8.p16a:p8.p16b); }
function nombreEqCuarto(pC, lado) { return ganador8(lado==='l'?pC.p8a:pC.p8b); }
function nombreEqSemi(pS, lado) { return ganadorCuarto(lado==='l'?pS.pQa:pS.pQb); }
function nombreEqFinal(pF, lado) {
  const idxS=lado==='l'?pF.pSa:pF.pSb;
  const semi=partidosSemis.find(function(s){return s.idx===idxS;}); if (!semi) return null;
  const res=resNuevas[String(idxS)]; if (!res) return null;
  const lN=ganadorCuarto(semi.pQa), vN=ganadorCuarto(semi.pQb); if (!lN||!vN) return null;
  if (pF.sec==='3er Lugar') return res[0]>res[1]?vN:lN;
  return res[0]>res[1]?lN:vN;
}

// ===== CALCULOS =====
function calcPtsNueva(pro, res) {
  if (!pro||!res) return null;
  if (pro[0]===res[0]&&pro[1]===res[1]) return 2;
  const pG=pro[0]>pro[1]?1:pro[0]<pro[1]?-1:0, rG=res[0]>res[1]?1:res[0]<res[1]?-1:0;
  return pG===rG?1:0;
}
function calcFase(nombre, partidos, pros) {
  if (!pros||!Object.keys(pros).length) return 0;
  const d=pros[nombre]; if (!d) return 0;
  let pts=0;
  partidos.forEach(function(p,i){
    const res=resNuevas[String(p.idx)]; if (!res) return;
    const p2=calcPtsNueva(d.pronos[i],res); if (p2) pts+=p2;
  });
  return pts;
}

// ===== RENDER TABLA GENERAL =====
function renderGeneral() {
  const rows = JUGADORES.map(function(n,i){
    const base=puntosAnteriores[n]||{f1:0,f2:0,f3:0,f16:0};
    const v8=calcFase(n,partidos8,pros8);
    const vf=calcFase(n,[...partidosCuartos,...partidosSemis,...partidosFinal],prosFinal);
    const ajuste=(window._ajustes&&window._ajustes[n])?window._ajustes[n]:0;
    const total=base.f1+base.f2+base.f3+base.f16+v8+vf+ajuste;
    return {n,i,f1:base.f1,f2:base.f2,f3:base.f3,f16:base.f16,v8,vf,ajuste,total};
  }).sort(function(a,b){return b.total-a.total;});
  document.getElementById('tbody-general').innerHTML=rows.map(function(r,pos){
    const medal=pos===0?'🥇':pos===1?'🥈':pos===2?'🥉':'';
    const posClass=pos===0?'gold':pos===1?'silver':pos===2?'bronze':'';
    const dyn=r.v8+r.vf;
    const c=COLORS[r.i%COLORS.length];
    return '<tr>'
      +'<td class="pos '+posClass+'" style="text-align:center;font-weight:700">'+(medal||(pos+1))+'</td>'
      +'<td><div class="nombre-cell"><div class="avatar" style="background:'+c+'33;color:'+c+';border:1px solid '+c+'55">'+r.n[0]+'</div><span>'+r.n+'</span></div></td>'
      +'<td class="pts-cell col-hide-mobile" style="color:var(--muted)">'+r.f1+'</td>'
      +'<td class="pts-cell col-hide-mobile" style="color:var(--muted)">'+r.f2+'</td>'
      +'<td class="pts-cell col-hide-mobile" style="color:var(--muted)">'+r.f3+'</td>'
      +'<td class="pts-cell col-hide-mobile" style="color:var(--muted)">'+r.f16+'</td>'
      +'<td class="pts-cell" style="color:var(--amarillo);font-weight:700">'+(dyn>0?'+'+dyn:'–')+'</td>'
      +'<td class="pts-cell"><div class="pts-total">'+r.total+'</div></td>'
      +'</tr>';
  }).join('');
}

// ===== RENDER CARDS GENERICA =====
function renderCards(containerId, partidos, pros, getNomL, getNomV, labelFn) {
  const grid = document.getElementById(containerId);
  if (!grid) return;
  const now = Date.now();
  let html = '';
  partidos.forEach(function(p, pIdx) {
    const lNom = getNomL(p) || '?';
    const vNom = getNomV(p) || '?';
    const res = resNuevas[String(p.idx)];
    const kick = new Date(p.k).getTime();

    let statusLabel, statusClass, lg, vg, pulse='';
    if (res) { statusLabel='Finalizado'; statusClass='status-end'; lg=res[0]; vg=res[1]; }
    else if (now>=kick&&now<end) { statusLabel=Math.floor((now-kick)/60000)+"'"; statusClass='status-live'; lg='-'; vg='-'; pulse='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--rojo);margin-right:5px;animation:blink 1s infinite"></span>'; }
    else if (now<kick) { const kd=new Date(p.k); statusLabel=kd.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',timeZone:'America/Tijuana'})+' '+kd.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tijuana'})+' PDT'; statusClass='status-soon'; lg='-'; vg='-'; }
    else { statusLabel='Por confirmar'; statusClass='status-soon'; lg='-'; vg='-'; }
    const chips = JUGADORES_ORD.map(function(nombre) {
      const datJug=pros[nombre]; const pro=datJug?datJug.pronos[pIdx]:null;
      if (!pro) return '<span class="pro-chip pro-pending">· '+nombre.split(' ')[0]+' -</span>';
      const pts=calcPtsNueva(pro,res);
      const cls=pts===2?'pro-exact':pts===1?'pro-winner':pts===0?'pro-miss':'pro-pending';
      const icon=pts===2?'✓✓':pts===1?'✓':pts===0?'✗':'·';
      return '<span class="pro-chip '+cls+'">'+icon+' '+nombre.split(' ')[0]+' '+pro[0]+'-'+pro[1]+'</span>';
    }).join('');
    const sc=statusClass==='status-end'?'var(--verde)':'var(--text)';
    const titulo = labelFn ? labelFn(p, pIdx) : (lNom+' vs '+vNom);
    if (p.sec) html += '<div class="fase-titulo">'+p.sec+'</div>';
    html += '<div class="partido-card">'
      +'<div class="partido-header"><span class="partido-nombre">'+titulo+'</span><span class="partido-status '+statusClass+'">'+pulse+statusLabel+'</span></div>'
      +'<div class="partido-marcador">'
      +'<div class="equipo"><div class="equipo-nombre">'+lNom+'</div><div class="goles" style="color:'+sc+'">'+lg+'</div></div>'
      +'<div style="color:var(--muted);font-size:14px;padding:0 8px">vs</div>'
      +'<div class="equipo"><div class="equipo-nombre">'+vNom+'</div><div class="goles" style="color:'+sc+'">'+vg+'</div></div>'
      +'</div>'
      +'<div class="pronosticos-list"><div class="pro-titulo">PRONOSTICOS (20)</div>'
      +'<div class="pro-items">'+chips+'</div></div></div>';
  });
  grid.innerHTML = html || '<div class="pendiente-msg"><div class="icon">⏳</div>Los partidos aparecerán conforme avance el torneo</div>';
}

// ===== RENDER TABLA DINAMICA =====
function renderDinamica(partidos, getNomL, getNomV, pros, containerId, mensajePendiente) {
  const contenido = document.getElementById(containerId); if (!contenido) return;
  const visibles = partidos.filter(function(p){return getNomL(p)!==null||getNomV(p)!==null;});
  if (visibles.length===0) { contenido.innerHTML='<div class="pendiente-msg"><div class="icon">⏳</div>'+mensajePendiente+'</div>'; return; }
  let hdr='<tr style="background:#1a2a1a"><th style="position:sticky;left:0;background:#1a2a1a;z-index:3;padding:8px;text-align:left;color:#6b8f6b;font-size:11px">JUGADOR</th>';
  visibles.forEach(function(p){
    const lN=getNomL(p)||'?', vN=getNomV(p)||'?';
    const res=resNuevas[String(p.idx)];
    const resLabel=res?'<br><span style="color:#00C853">'+res[0]+'-'+res[1]+'</span>':'';
    const lC=lN==='?'?'#3a4a3a':'#6b8f6b', vC=vN==='?'?'#3a4a3a':'#6b8f6b';
    const sec=p.sec?'<div style="font-size:9px;color:#00C853;margin-bottom:2px">'+p.sec+'</div>':'';
    hdr+='<th style="min-width:120px;padding:6px 4px;font-size:10px;text-align:center">'+sec+'<span style="color:'+lC+'">'+lN+'</span><br><span style="color:#6b8f6b">vs</span><br><span style="color:'+vC+'">'+vN+'</span>'+resLabel+'</th>';
  });
  hdr+='<th style="padding:8px;color:#FFD600;min-width:40px">PTS</th></tr>';
  let rows='';
  JUGADORES_ORD.forEach(function(nombre){
    const d=pros[nombre]; let pts=0, celdas='';
    visibles.forEach(function(p){
      const iO=partidos.findIndex(function(b){return b.idx===p.idx;});
      const pro=d?d.pronos[iO]:null, res=resNuevas[String(p.idx)];
      const puntos=calcPtsNueva(pro,res); let bg='', color='#6b8f6b';
      const txt=pro?pro[0]+'-'+pro[1]:'·';
      if(puntos===2){bg='rgba(0,200,83,0.25)';color='#00C853';pts+=2;}
      else if(puntos===1){bg='rgba(255,214,0,0.2)';color='#FFD600';pts+=1;}
      else if(puntos===0&&res){bg='rgba(255,23,68,0.1)';color='#FF1744';}

// ===== PRONOSTICOS =====
async function leerProsSheet(action) {
  try {
    const r=await fetch(APPS_SCRIPT_URL+'?action='+action+'&t='+Date.now());
    if (!r.ok) return {};
    const data=await r.json();
    const pros={};
    for(const[n,pronos] of Object.entries(data)){pros[n]={pronos};}
    return pros;
  } catch(e){return {};}
}

// ===== FETCH =====
async function fetchSheetResults() {
  try {
    const r=await fetch(APPS_SCRIPT_URL+'?t='+Date.now(),{cache:'no-store'});
    const data=await r.json();
    let changed=false;
    for(const[key,res] of Object.entries(data)){
      const idx=parseInt(key);
      if (!isNaN(idx)&&Array.isArray(res)){
        savedRes[String(idx)]=res;
        if (idx>=100) resNuevas[String(idx)]=res;
        changed=true;
      }
    }
    if (changed) refreshActive();
  } catch(e){ console.warn('Sin conexion:',e); }
  try {
    const ra=await fetch(APPS_SCRIPT_URL+'?action=getAjustes&t='+Date.now());
    window._ajustes=await ra.json();
    renderGeneral();
  } catch(ea){ window._ajustes=window._ajustes||{}; }
}

function refreshActive() {
  renderGeneral();
  const t=document.querySelector('.tab.active');
  if (!t) return;
  const txt=t.textContent;
  if (txt.includes('8vos')&&txt.includes('⚔️')) renderCards8vos();
  if (txt.includes('Final')&&txt.includes('⚔️')) renderCardsFinal();
  if (txt.includes('Tab 8vos')) renderDinamica(partidos8,function(p){return nombreEq8(p,'l');},function(p){return nombreEq8(p,'v');},pros8,'contenido-8vos','Los 8vos se mostrarán conforme avancen los 16vos');
  if (txt.includes('Tab Final')) renderFaseFinal();
  if (txt.includes('Tab 16vos')) renderFaseTabla16();
}

// ===== TABS =====
function showTab(tab) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  const el=document.getElementById('tab-'+tab); if(el) el.classList.add('active');
  if(event&&event.target) event.target.classList.add('active');
  if (tab==='partidos16') renderCardsPartidos16();
  else if (tab==='partidos8') renderCards8vos();
  else if (tab==='partidosfinal') renderCardsFinal();
  else if (tab==='tabla16') renderTabla16();
  else if (tab==='tabla8') renderTabla8();
  else if (tab==='tablafinal') renderTablaFinal();
}

    else if (now<kick){const kd=new Date(p.k);statusLabel=kd.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',timeZone:'America/Tijuana'})+' '+kd.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tijuana'})+' PDT';statusClass='status-soon';lg='-';vg='-';}
    else{statusLabel='Por confirmar';statusClass='status-soon';lg='-';vg='-';}
    const chips=JUGADORES_ORD.map(function(nombre){
      const d=prosFinal[nombre]; const pro=d?d.pronos[pIdx]:null;
      if (!pro) return '<span class="pro-chip pro-pending">· '+nombre.split(' ')[0]+' -</span>';
      const pts=calcPtsNueva(pro,res);
      const cls=pts===2?'pro-exact':pts===1?'pro-winner':pts===0?'pro-miss':'pro-pending';
      const icon=pts===2?'✓✓':pts===1?'✓':pts===0?'✗':'·';
      return '<span class="pro-chip '+cls+'">'+icon+' '+nombre.split(' ')[0]+' '+pro[0]+'-'+pro[1]+'</span>';
    }).join('');
    const sc=statusClass==='status-end'?'var(--verde)':'var(--text)';
    if (p.sec) html+='<div class="fase-titulo" style="grid-column:1/-1">'+p.sec+'</div>';

  grid.innerHTML=html||'<div class="pendiente-msg"><div class="icon">🏆</div>Los cuartos aparecerán cuando avancen los 8vos</div>';

function updateLiveBadge() {
  const now=Date.now();
  const allP=[...partidos8,...partidosCuartos,...partidosSemis,...partidosFinal];
  const live=allP.some(function(p){
    if (resNuevas[String(p.idx)]) return false;
    const kick=new Date(p.k).getTime();
    return now>=kick&&now<kick+115*60*1000;
  });
  const b=document.querySelector('.live-badge');
  if (b) b.style.display=live?'flex':'none';
}
