<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Bebas+Neue&display=swap');
  :root {
    --verde: #00C853; --verde-dark: #00962e; --amarillo: #FFD600;
    --rojo: #FF1744; --bg: #0a0f0a; --bg2: #111711; --bg3: #1a211a;
    --card: #1e271e; --border: #2a3a2a; --text: #e8f5e9;
    --muted: #6b8f6b; --exact: #00C853; --winner: #FFD600; --miss: #FF1744;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: linear-gradient(135deg, #0d1f0d 0%, #1a3d1a 50%, #0d1f0d 100%); border-bottom: 2px solid var(--verde); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--verde); text-shadow: 0 0 20px rgba(0,200,83,0.4); }
  .logo span { color: var(--amarillo); }
  .live-badge { display: flex; align-items: center; gap: 8px; background: rgba(255,23,68,0.15); border: 1px solid var(--rojo); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--rojo); letter-spacing: 1px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rojo); animation: blink 1.5s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; overflow-x: auto; }
  .tab { padding: 14px 20px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--verde); border-bottom-color: var(--verde); }
  main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
  .tabla-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .tabla-header { padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .tabla-titulo { font-size: 14px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
  .refresh-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .refresh-btn:hover { border-color: var(--verde); color: var(--verde); }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; background: var(--bg3); border-bottom: 1px solid var(--border); }
  th.num { text-align: center; width: 50px; } th.pts { text-align: center; }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .pos { text-align: center; font-weight: 700; color: var(--muted); }
  .pos.gold { color: #FFD700; } .pos.silver { color: #C0C0C0; } .pos.bronze { color: #CD7F32; }
  .nombre-cell { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .pts-cell { text-align: center; font-weight: 700; font-size: 15px; }
  .pts-total { font-size: 20px; font-weight: 900; color: var(--verde); }
  .partidos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .partido-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .partido-header { padding: 10px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .partido-nombre { font-size: 12px; font-weight: 600; color: var(--text); }
  .partido-status { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .status-live { background: rgba(255,23,68,0.2); color: var(--rojo); }
  .status-end { background: rgba(0,200,83,0.15); color: var(--verde); }
  .status-soon { background: rgba(255,214,0,0.15); color: var(--amarillo); }
  .partido-marcador { padding: 16px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .equipo { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .equipo-nombre { font-size: 12px; font-weight: 600; text-align: center; color: var(--text); }
  .goles { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--verde); line-height: 1; }
  .pronosticos-list { padding: 8px 14px 12px; border-top: 1px solid var(--border); }
  .pro-titulo { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .pro-items { display: flex; flex-wrap: wrap; gap: 4px; }
  .pro-chip { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; border: 1px solid; }
  .pro-exact { background: rgba(0,200,83,0.15); border-color: rgba(0,200,83,0.4); color: var(--exact); }
  .pro-winner { background: rgba(255,214,0,0.12); border-color: rgba(255,214,0,0.4); color: var(--winner); }
  .pro-miss { background: rgba(255,23,68,0.1); border-color: rgba(255,23,68,0.3); color: #ff6b6b; }
  .pro-pending { background: rgba(255,255,255,0.05); border-color: var(--border); color: var(--muted); }
  .leyenda { display: flex; gap: 16px; align-items: center; padding: 12px 1.5rem; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .ley-item { display: flex; align-items: center; gap: 6px; }
  .ley-dot { width: 10px; height: 10px; border-radius: 50%; }
  .section { display: none; } .section.active { display: block; }
  .pendiente-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .pendiente-msg .icon { font-size: 40px; margin-bottom: 12px; }
  @media (max-width: 768px) {
    header { padding: 10px 12px; } .logo { font-size: 1.1rem; }
    .tabs { padding: 0 8px; } .tab { padding: 12px 14px; font-size: 12px; }
    main { padding: 10px; } table { font-size: 12px; }
    th, td { padding: 8px 6px; } .avatar { width: 26px; height: 26px; font-size: 10px; }
    .pts-total { font-size: 16px; } .partidos-grid { grid-template-columns: 1fr !important; gap: 10px; }
    .goles { font-size: 2rem !important; } .col-hide-mobile { display: none; }
    .leyenda { font-size: 10px; gap: 10px; padding: 10px 12px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">QUINIELA <span>MUNDIAL</span> 2026</div>
  <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
</header>
<div class="tabs">
  <div class="tab active" onclick="showTab('general')">🏆 Tabla General</div>
  <div class="tab" onclick="showTab('ochos')">⚔️ 8vos</div>
  <div class="tab" onclick="showTab('cuartos')">⚔️ 4tos</div>
  <div class="tab" onclick="showTab('semis')">⚔️ Semi</div>
  <div class="tab" onclick="showTab('final')">🏆 Final</div>
  <div class="tab" onclick="showTab('tercer')">🥉 3er Lugar</div>
</div>
<main>
  <!-- TABLA GENERAL -->
  <section id="tab-general" class="section active">
    <div class="tabla-wrap">
      <div class="tabla-header">
        <div class="tabla-titulo">Clasificación General</div>
        <button class="refresh-btn" onclick="recalcular()">↻ Recalcular</button>
      </div>
      <div style="overflow-x:auto">
      <table id="tabla-general">
        <thead><tr>
          <th class="num">#</th><th>JUGADOR</th>
          <th class="pts" title="Marcadores exactos (criterio de desempate)">ME</th>
          <th class="pts col-hide-mobile">F1</th>
          <th class="pts col-hide-mobile">F2</th>
          <th class="pts col-hide-mobile">F3</th>
          <th class="pts col-hide-mobile">16VOS</th>
          <th class="pts">8VOS</th>
          <th class="pts">4TOS</th>
          <th class="pts">SEMI</th>
          <th class="pts">FINAL</th>
          <th class="pts">3ER</th>
          <th class="pts">TOTAL</th>
        </tr></thead>
        <tbody id="tbody-general"></tbody>
      </table>
      </div>
      <div class="leyenda">
        <div class="ley-item"><div class="ley-dot" style="background:var(--exact)"></div> Marcador exacto = 2 pts</div>
        <div class="ley-item"><div class="ley-dot" style="background:var(--winner)"></div> Solo ganador/empate = 1 pt</div>
        <div class="ley-item"><div class="ley-dot" style="background:#ff6b6b"></div> Fallo = 0 pts</div>
      </div>
    </div>
  </section>
  <!-- 8VOS -->
  <section id="tab-ochos" class="section">
    <div id="grid-ochos" class="partidos-grid" style="padding:16px"></div>
  </section>
  <!-- 4TOS -->
  <section id="tab-cuartos" class="section">
    <div id="grid-cuartos" class="partidos-grid" style="padding:16px"></div>
  </section>
  <!-- SEMIS -->
  <section id="tab-semis" class="section">
    <div id="grid-semis" class="partidos-grid" style="padding:16px"></div>
  </section>
  <!-- FINAL -->
  <section id="tab-final" class="section">
    <div id="grid-final" class="partidos-grid" style="padding:16px"></div>
  </section>
  <!-- 3ER LUGAR -->
  <section id="tab-tercer" class="section">
    <div id="grid-tercer" class="partidos-grid" style="padding:16px"></div>
  </section>
</main>
<script>
const puntosAnteriores = {
  'Olguin':        { f1:13, f2:21, f3:22, f16:14 },
  'Pedro':         { f1:16, f2:20, f3:16, f16:17 },
  'Luis':          { f1:13, f2:16, f3:19, f16: 9 },
  'Rafa':          { f1:12, f2:22, f3:18, f16:16 },
  'Alonso':        { f1:17, f2:20, f3:16, f16:15 },
  'Vanessa':       { f1:17, f2:19, f3:19, f16: 8 },
  'Espino':        { f1:12, f2:12, f3:24, f16:18 },
  'Papa Espino':   { f1:14, f2:16, f3:10, f16:16 },
  'Said':          { f1:16, f2:19, f3:18, f16:15 },
  'Cesar':         { f1:14, f2:20, f3:15, f16:12 },
  'Noe':           { f1:11, f2:14, f3:12, f16:11 },
  'Don Jorge':     { f1:12, f2:19, f3:18, f16:11 },
  'Maluma':        { f1:16, f2:21, f3:20, f16:15 },
  'Alex':          { f1:15, f2:19, f3:19, f16:14 },
  'Hazael':        { f1:14, f2:17, f3:17, f16: 9 },
  'Gamez':         { f1:15, f2:22, f3:18, f16:12 },
  'Alejandra':     { f1: 8, f2:15, f3:19, f16:10 },
  'Lic Dominguez': { f1:16, f2:17, f3:13, f16:11 },
  'Ray':           { f1:16, f2:18, f3:20, f16:15 },
  'Jesus':         { f1:13, f2:15, f3:18, f16:15 },
};
// Marcadores exactos acumulados hasta 8vos (tomado de la hoja "Sumatoria"). Sirve de base fija
// para el desempate; de aqui en adelante (4tos, semis, final, 3er) se le suma lo que se calcule dinamicamente.
const meAnteriores = {
  'Olguin':12, 'Pedro':10, 'Luis':0, 'Rafa':12, 'Alonso':13, 'Vanessa':0,
  'Espino':13, 'Papa Espino':0, 'Said':13, 'Cesar':0, 'Noe':0, 'Don Jorge':0,
  'Maluma':15, 'Alex':13, 'Hazael':0, 'Gamez':11, 'Alejandra':0,
  'Lic Dominguez':0, 'Ray':14, 'Jesus':0,
};
const JUGADORES = Object.keys(puntosAnteriores);
const JUGADORES_ORD = ['Maluma','Gamez','Vanessa','Ray','Olguin','Pedro','Alonso','Alex','Said','Rafa','Cesar','Don Jorge','Lic Dominguez','Jesus','Luis','Hazael','Espino','Papa Espino','Alejandra','Noe'];
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#e91e63','#00bcd4','#ff5722','#607d8b','#8bc34a','#ff9800','#673ab7','#03a9f4','#4caf50','#f44336','#795548','#009688'];

// ===== SOLO EQUIPOS DE 8VOS EN ADELANTE (16vos ya se jugaron) =====
const partidos8 = [
  {idx:200, l:'Paraguay',  v:'Francia',    k:'2026-07-04T22:00:00Z'},
  {idx:201, l:'Canada',    v:'Marruecos',  k:'2026-07-04T18:00:00Z'},
  {idx:202, l:'Portugal',  v:'España',     k:'2026-07-06T19:00:00Z'},
  {idx:203, l:'USA',       v:'Belgica',    k:'2026-07-07T00:00:00Z'},
  {idx:204, l:'Brasil',    v:'Noruega',    k:'2026-07-05T21:00:00Z'},
  {idx:205, l:'Mexico',    v:'Inglaterra', k:'2026-07-06T01:00:00Z'},
  {idx:206, l:'Argentina', v:'Egipto',     k:'2026-07-07T16:00:00Z'},
  {idx:207, l:'Suiza',     v:'Colombia',   k:'2026-07-07T20:00:00Z'},
];

const partidosCuartos = [
  {idx:300, p8a:200, p8b:201, k:'2026-07-09T16:00:00Z'},
  {idx:301, p8a:202, p8b:203, k:'2026-07-10T15:00:00Z'},
  {idx:302, p8a:204, p8b:205, k:'2026-07-11T17:00:00Z'},
  {idx:303, p8a:206, p8b:207, k:'2026-07-11T21:00:00Z'},
];
const partidosSemis = [
  {idx:400, pQa:300, pQb:301, k:'2026-07-14T21:00:00Z'},
  {idx:401, pQa:302, pQb:303, k:'2026-07-15T21:00:00Z'},
];
const partido3er   = {idx:500, pSa:400, pSb:401, k:'2026-07-18T23:00:00Z'};
const partidoFinal = {idx:501, pSa:400, pSb:401, k:'2026-07-19T19:00:00Z'};

const resNuevas = {
  '200': [1,0],
  '201': [3,0],
  '204': [2,1],
  '205': [3,2],
};
var avances = {};
var pros8PorIdx = {}, prosFinalPorIdx = {};
window._ajustes = {};

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmhRq7q-L88iAdPva9X5FIej1vStWn7GUKgBMfJ1_8t2YI9mRdBGO2-Xxjyfp7J2dc/exec';

// ===== GANADORES (definidos manualmente por el admin, no por marcador) =====
function ganador8(idx) { return avances[String(idx)] || null; }
function ganadorCuarto(idx) { return avances[String(idx)] || null; }
function ganadorSemi(idx) { return avances[String(idx)] || null; }

function nombreEqCuarto(pC, lado) { return ganador8(lado==='l'?pC.p8a:pC.p8b); }
function nombreEqSemi(pS, lado) { return ganadorCuarto(lado==='l'?pS.pQa:pS.pQb); }

// Devuelve {ganador, perdedor} de una semifinal, usando el avance manual (idx 400/401)
function resultadoSemi(idxSemi) {
  const semi=partidosSemis.find(function(s){return s.idx===idxSemi;}); if (!semi) return null;
  const a=ganadorCuarto(semi.pQa), b=ganadorCuarto(semi.pQb);
  if (!a||!b) return null;
  const g=ganadorSemi(idxSemi); if (!g) return null;
  return {ganador:g, perdedor:(g===a)?b:a};
}
function nombreFinal(lado) {
  const r=resultadoSemi(partidoFinal.pSa); const r2=resultadoSemi(partidoFinal.pSb);
  if (lado==='l') return r?r.ganador:null;
  return r2?r2.ganador:null;
}
function nombreTercer(lado) {
  const r=resultadoSemi(partido3er.pSa); const r2=resultadoSemi(partido3er.pSb);
  if (lado==='l') return r?r.perdedor:null;
  return r2?r2.perdedor:null;
}

// ===== CALCULOS =====
function calcPtsNueva(pro, res) {
  if (!pro||!res) return null;
  if (pro[0]===res[0]&&pro[1]===res[1]) return 2;
  const pG=pro[0]>pro[1]?1:pro[0]<pro[1]?-1:0, rG=res[0]>res[1]?1:res[0]<res[1]?-1:0;
  return pG===rG?1:0;
}
function calcFase(nombre, partidosArr, prosPorIdx) {
  if (!prosPorIdx) return 0;
  const d = prosPorIdx[nombre]; if (!d) return 0;
  let pts=0;
  partidosArr.forEach(function(p){
    const res=resNuevas[String(p.idx)]; if (!res) return;
    const pro=d[String(p.idx)];
    const p2=calcPtsNueva(pro,res); if (p2) pts+=p2;
  });
  return pts;
}
// Cuenta cuántos marcadores EXACTOS (2 pts) acertó nombre en esa fase — para desempate
function countExactos(nombre, partidosArr, prosPorIdx) {
  if (!prosPorIdx) return 0;
  const d = prosPorIdx[nombre]; if (!d) return 0;
  let n=0;
  partidosArr.forEach(function(p){
    const res=resNuevas[String(p.idx)]; if (!res) return;
    const pro=d[String(p.idx)];
    if (calcPtsNueva(pro,res)===2) n++;
  });
  return n;
}

// ===== NORMALIZAR / EMPAREJAR PRONOSTICOS POR NOMBRE DE EQUIPO =====
function normalizar(s){ return (s||'').toString().trim().toLowerCase(); }
function construirProsPorIdx(headers, prosRaw, candidatos) {
  const colToIdx = (headers||[]).map(function(h){
    const hn=normalizar(h); if (!hn) return null;
    const c=candidatos.find(function(c){
      return c.l && c.v && hn.indexOf(normalizar(c.l))>-1 && hn.indexOf(normalizar(c.v))>-1;
    });
    return c ? c.idx : null;
  });
  const out={};
  Object.keys(prosRaw||{}).forEach(function(nombre){
    const arr=prosRaw[nombre]||[]; const porIdx={};
    arr.forEach(function(pro,i){
      const idx=colToIdx[i]; if (idx==null) return;
      porIdx[String(idx)]=pro;
    });
    out[nombre]=porIdx;
  });
  return out;
}

// ===== RENDER TABLA GENERAL =====
function renderGeneral() {
  const rows = JUGADORES.map(function(n,i){
    const base=puntosAnteriores[n]||{f1:0,f2:0,f3:0,f16:0};
    const v8=calcFase(n,partidos8,pros8PorIdx);
    const v4=calcFase(n,partidosCuartos,prosFinalPorIdx);
    const vs=calcFase(n,partidosSemis,prosFinalPorIdx);
    const vf=calcFase(n,[partidoFinal],prosFinalPorIdx);
    const v3=calcFase(n,[partido3er],prosFinalPorIdx);
    const ajuste=(window._ajustes&&window._ajustes[n])?window._ajustes[n]:0;
    const total=base.f1+base.f2+base.f3+base.f16+v8+v4+vs+vf+v3+ajuste;
    const me=(meAnteriores[n]||0)
      + countExactos(n,partidosCuartos,prosFinalPorIdx)
      + countExactos(n,partidosSemis,prosFinalPorIdx)
      + countExactos(n,[partidoFinal],prosFinalPorIdx)
      + countExactos(n,[partido3er],prosFinalPorIdx);
    return {n,i,f1:base.f1,f2:base.f2,f3:base.f3,f16:base.f16,v8,v4,vs,vf,v3,ajuste,total,me};
  }).sort(function(a,b){
    if (b.total!==a.total) return b.total-a.total;
    return b.me-a.me; // desempate: mas marcadores exactos primero
  });
  document.getElementById('tbody-general').innerHTML=rows.map(function(r,pos){
    const medal=pos===0?'🥇':pos===1?'🥈':pos===2?'🥉':'';
    const posClass=pos===0?'gold':pos===1?'silver':pos===2?'bronze':'';
    const c=COLORS[r.i%COLORS.length];
    const cell=function(v){ return v>0?'<span style="color:var(--amarillo);font-weight:700">+'+v+'</span>':'<span style="color:var(--muted)">–</span>'; };
    return '<tr>'
      +'<td class="pos '+posClass+'" style="text-align:center;font-weight:700">'+(medal||(pos+1))+'</td>'
      +'<td><div class="nombre-cell"><div class="avatar" style="background:'+c+'33;color:'+c+';border:1px solid '+c+'55">'+r.n[0]+'</div><span>'+r.n+'</span></div></td>'
      +'<td class="pts-cell" style="color:#8fd6ff;font-weight:700" title="Marcadores exactos (desempate)">'+r.me+'</td>'
      +'<td class="pts-cell col-hide-mobile" style="color:var(--muted)">'+r.f1+'</td>'
      +'<td class="pts-cell col-hide-mobile" style="color:var(--muted)">'+r.f2+'</td>'
      +'<td class="pts-cell col-hide-mobile" style="color:var(--muted)">'+r.f3+'</td>'
      +'<td class="pts-cell col-hide-mobile" style="color:var(--muted)">'+r.f16+'</td>'
      +'<td class="pts-cell">'+cell(r.v8)+'</td>'
      +'<td class="pts-cell">'+cell(r.v4)+'</td>'
      +'<td class="pts-cell">'+cell(r.vs)+'</td>'
      +'<td class="pts-cell">'+cell(r.vf)+'</td>'
      +'<td class="pts-cell">'+cell(r.v3)+'</td>'
      +'<td class="pts-cell"><div class="pts-total">'+r.total+'</div></td>'
      +'</tr>';
  }).join('');
}

// ===== RENDER CARDS GENERICA =====
function renderCards(containerId, partidosArr, prosPorIdx, getNomL, getNomV, labelFn, msgPendiente) {
  const grid = document.getElementById(containerId);
  if (!grid) return;
  const now = Date.now();
  let html = '';
  partidosArr.forEach(function(p, pIdx) {
    const lNom = getNomL(p) || '?';
    const vNom = getNomV(p) || '?';
    const res = resNuevas[String(p.idx)];
    const kick = new Date(p.k).getTime();
    const end = kick + 115*60*1000;
    let statusLabel, statusClass, lg, vg, pulse='';
    if (res) { statusLabel='Finalizado'; statusClass='status-end'; lg=res[0]; vg=res[1]; }
    else if (now>=kick&&now<end) { statusLabel=Math.floor((now-kick)/60000)+"'"; statusClass='status-live'; lg='-'; vg='-'; pulse='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--rojo);margin-right:5px;animation:blink 1s infinite"></span>'; }
    else if (now<kick) { const kd=new Date(p.k); statusLabel=kd.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',timeZone:'America/Tijuana'})+' '+kd.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tijuana'})+' PDT'; statusClass='status-soon'; lg='-'; vg='-'; }
    else { statusLabel='Por confirmar'; statusClass='status-soon'; lg='-'; vg='-'; }
    const chips = JUGADORES_ORD.map(function(nombre) {
      const d=prosPorIdx[nombre]; const pro=d?d[String(p.idx)]:null;
      if (!pro) return '<span class="pro-chip pro-pending">· '+nombre.split(' ')[0]+' -</span>';
      const pts=calcPtsNueva(pro,res);
      const cls=pts===2?'pro-exact':pts===1?'pro-winner':pts===0?'pro-miss':'pro-pending';
      const icon=pts===2?'✓✓':pts===1?'✓':pts===0?'✗':'·';
      return '<span class="pro-chip '+cls+'">'+icon+' '+nombre.split(' ')[0]+' '+pro[0]+'-'+pro[1]+'</span>';
    }).join('');
    const sc=statusClass==='status-end'?'var(--verde)':'var(--text)';
    const titulo = labelFn ? labelFn(p, pIdx) : (lNom+' vs '+vNom);
    html += '<div class="partido-card">'
      +'<div class="partido-header"><span class="partido-nombre">'+titulo+'</span><span class="partido-status '+statusClass+'">'+pulse+statusLabel+'</span></div>'
      +'<div class="partido-marcador">'
      +'<div class="equipo"><div class="equipo-nombre">'+lNom+'</div><div class="goles" style="color:'+sc+'">'+lg+'</div></div>'
      +'<div style="color:var(--muted);font-size:14px;padding:0 8px">vs</div>'
      +'<div class="equipo"><div class="equipo-nombre">'+vNom+'</div><div class="goles" style="color:'+sc+'">'+vg+'</div></div>'
      +'</div>'
      +'<div class="pronosticos-list"><div class="pro-titulo">PRONOSTICOS (20)</div>'
      +'<div class="pro-items">'+chips+'</div></div></div>';
  });
  grid.innerHTML = html || '<div class="pendiente-msg" style="grid-column:1/-1"><div class="icon">⏳</div>'+(msgPendiente||'Los partidos aparecerán conforme avance el torneo')+'</div>';
}

// ===== PRONOSTICOS: cargar desde el Sheet y emparejar por nombre de equipo =====
async function leerProsSheet(action) {
  try {
    const r=await fetch(APPS_SCRIPT_URL+'?action='+action+'&t='+Date.now());
    if (!r.ok) return {headers:[],pros:{}};
    return await r.json();
  } catch(e){ return {headers:[],pros:{}}; }
}

async function cargarPros8() {
  const raw = await leerProsSheet('pros8');
  const candidatos = partidos8.map(function(p){ return {idx:p.idx, l:p.l, v:p.v}; });
  pros8PorIdx = construirProsPorIdx(raw.headers, raw.pros, candidatos);
}

async function cargarProsFinal() {
  const raw = await leerProsSheet('prosfinal');
  const candidatos = []
    .concat(partidosCuartos.map(function(p){ return {idx:p.idx, l:nombreEqCuarto(p,'l'), v:nombreEqCuarto(p,'v')}; }))
    .concat(partidosSemis.map(function(p){ return {idx:p.idx, l:nombreEqSemi(p,'l'), v:nombreEqSemi(p,'v')}; }))
    .concat([{idx:partido3er.idx, l:nombreTercer('l'), v:nombreTercer('v')}])
    .concat([{idx:partidoFinal.idx, l:nombreFinal('l'), v:nombreFinal('v')}]);
  prosFinalPorIdx = construirProsPorIdx(raw.headers, raw.pros, candidatos);
}

// ===== AVANCES =====
async function leerAvances() {
  try {
    const r=await fetch(APPS_SCRIPT_URL+'?action=getAvances&t='+Date.now());
    avances=await r.json();
  } catch(e){ avances=avances||{}; }
  await cargarProsFinal(); // los nombres de 4tos/semis/final dependen de los avances
  refreshActive();
}

// ===== AJUSTES =====
async function leerAjustes() {
  try {
    const ra=await fetch(APPS_SCRIPT_URL+'?action=getAjustes&t='+Date.now());
    window._ajustes=await ra.json();
    renderGeneral();
  } catch(ea){ window._ajustes=window._ajustes||{}; }
}

// ===== FETCH RESULTADOS =====
async function fetchSheetResults() {
  try {
    const r=await fetch(APPS_SCRIPT_URL+'?t='+Date.now(),{cache:'no-store'});
    const data=await r.json();
    let changed=false;
    for(const[key,res] of Object.entries(data)){
      const idx=parseInt(key);
      if (!isNaN(idx)&&Array.isArray(res)){
        resNuevas[String(idx)]=res;
        changed=true;
      }
    }
    if (changed) refreshActive();
  } catch(e){ console.warn('Sin conexion:',e); }
}

function refreshActive() {
  renderGeneral();
  const t=document.querySelector('.tab.active');
  if (!t) return;
  const txt=t.textContent;
  if (txt.includes('8vos')) renderOchos();
  else if (txt.includes('4tos')) renderCuartos();
  else if (txt.includes('Semi')) renderSemis();
  else if (txt.includes('Final')) renderFinalTab();
  else if (txt.includes('3er')) renderTercerTab();
}

// ===== TABS =====
function showTab(tab) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  const el=document.getElementById('tab-'+tab); if(el) el.classList.add('active');
  if(event&&event.target) event.target.classList.add('active');
  if (tab==='ochos') renderOchos();
  else if (tab==='cuartos') renderCuartos();
  else if (tab==='semis') renderSemis();
  else if (tab==='final') renderFinalTab();
  else if (tab==='tercer') renderTercerTab();
}

async function renderOchos() {
  if (!Object.keys(pros8PorIdx).length) await cargarPros8();
  renderCards('grid-ochos', partidos8, pros8PorIdx,
    function(p){return p.l;}, function(p){return p.v;},
    function(p,i){return 'P'+(i+1)+' · '+p.l+' vs '+p.v;},
    'Los 8vos aparecerán aquí');
}
async function renderCuartos() {
  renderCards('grid-cuartos', partidosCuartos, prosFinalPorIdx,
    function(p){return nombreEqCuarto(p,'l');}, function(p){return nombreEqCuarto(p,'v');},
    function(p,i){return 'C'+(i+1)+' · '+(nombreEqCuarto(p,'l')||'?')+' vs '+(nombreEqCuarto(p,'v')||'?');},
    'Los 4tos se mostrarán conforme el admin marque quién avanza de 8vos');
}
async function renderSemis() {
  renderCards('grid-semis', partidosSemis, prosFinalPorIdx,
    function(p){return nombreEqSemi(p,'l');}, function(p){return nombreEqSemi(p,'v');},
    function(p,i){return 'S'+(i+1)+' · '+(nombreEqSemi(p,'l')||'?')+' vs '+(nombreEqSemi(p,'v')||'?');},
    'Las semis se mostrarán conforme avancen los 4tos');
}
async function renderFinalTab() {
  renderCards('grid-final', [partidoFinal], prosFinalPorIdx,
    function(){return nombreFinal('l');}, function(){return nombreFinal('v');},
    function(){return '🏆 GRAN FINAL';},
    'La final se mostrará conforme avancen las semis');
}
async function renderTercerTab() {
  renderCards('grid-tercer', [partido3er], prosFinalPorIdx,
    function(){return nombreTercer('l');}, function(){return nombreTercer('v');},
    function(){return '🥉 3ER LUGAR';},
    'El 3er lugar se mostrará conforme avancen las semis');
}

function updateLiveBadge() {
  const now=Date.now();
  const allP=[...partidos8,...partidosCuartos,...partidosSemis,partido3er,partidoFinal];
  const live=allP.some(function(p){
    if (resNuevas[String(p.idx)]) return false;
    const kick=new Date(p.k).getTime();
    return now>=kick&&now<kick+115*60*1000;
  });
  const b=document.querySelector('.live-badge');
  if (b) b.style.display=live?'flex':'none';
}

function recalcular(){fetchSheetResults();leerAvances();}

// ===== INIT =====
renderGeneral();
updateLiveBadge();
leerAjustes();
cargarPros8().then(function(){ fetchSheetResults(); });
leerAvances();
setInterval(function(){fetchSheetResults();updateLiveBadge();},10000);
setInterval(leerAvances,20000);
</script>
