<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Bebas+Neue&display=swap');

  :root {
    --verde: #00C853;
    --verde-dark: #00962e;
    --amarillo: #FFD600;
    --rojo: #FF1744;
    --bg: #0a0f0a;
    --bg2: #111711;
    --bg3: #1a211a;
    --card: #1e271e;
    --border: #2a3a2a;
    --text: #e8f5e9;
    --muted: #6b8f6b;
    --exact: #00C853;
    --winner: #FFD600;
    --miss: #FF1744;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1f0d 0%, #1a3d1a 50%, #0d1f0d 100%);
    border-bottom: 2px solid var(--verde);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--verde);
    text-shadow: 0 0 20px rgba(0,200,83,0.4);
  }

  .logo span { color: var(--amarillo); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,23,68,0.15);
    border: 1px solid var(--rojo);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--rojo);
    letter-spacing: 1px;
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--rojo);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    overflow-x: auto;
  }

  .tab {
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--verde); border-bottom-color: var(--verde); }

  /* MAIN */
  main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }

  /* TABLA GENERAL */
  .tabla-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .tabla-header {
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .tabla-titulo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .refresh-btn:hover { border-color: var(--verde); color: var(--verde); }

  table { width: 100%; border-collapse: collapse; }

  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }

  th.num { text-align: center; width: 50px; }
  th.pts { text-align: center; }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.03); }

  .pos { text-align: center; font-weight: 700; color: var(--muted); }
  .pos.gold { color: #FFD700; }
  .pos.silver { color: #C0C0C0; }
  .pos.bronze { color: #CD7F32; }

  .nombre-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .pts-cell {
    text-align: center;
    font-weight: 700;
    font-size: 16px;
  }

  .pts-total {
    font-size: 20px;
    font-weight: 900;
    color: var(--verde);
  }

  .pts-fase {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .mini-bar {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .mini-bar-fill {
    height: 100%;
    background: var(--verde);
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  /* PARTIDOS */
  .partidos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  .partido-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .partido-header {
    padding: 10px 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .partido-nombre {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .partido-status {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .status-live { background: rgba(255,23,68,0.2); color: var(--rojo); }
  .status-end { background: rgba(0,200,83,0.15); color: var(--verde); }
  .status-soon { background: rgba(255,214,0,0.15); color: var(--amarillo); }

  .partido-marcador {
    padding: 16px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .equipo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .equipo-nombre {
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    color: var(--text);
  }

  .goles {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--verde);
    line-height: 1;
  }

  .vs {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .pronosticos-list {
    padding: 8px 14px 12px;
    border-top: 1px solid var(--border);
  }

  .pro-titulo {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .pro-items {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .pro-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid;
  }

  .pro-exact { background: rgba(0,200,83,0.15); border-color: rgba(0,200,83,0.4); color: var(--exact); }
  .pro-winner { background: rgba(255,214,0,0.12); border-color: rgba(255,214,0,0.4); color: var(--winner); }
  .pro-miss { background: rgba(255,23,68,0.1); border-color: rgba(255,23,68,0.3); color: #ff6b6b; }
  .pro-pending { background: rgba(255,255,255,0.05); border-color: var(--border); color: var(--muted); }

  /* INPUT RESULTADO */
  .resultado-input {
    background: var(--bg3);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .resultado-input label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    flex-shrink: 0;
  }

  .score-input {
    width: 40px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    text-align: center;
    padding: 4px;
    outline: none;
  }
  .score-input:focus { border-color: var(--verde); }

  .score-sep { color: var(--muted); font-weight: 700; }

  .guardar-btn {
    margin-left: auto;
    background: var(--verde);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .guardar-btn:hover { background: var(--verde-dark); }

  /* LEYENDA */
  .leyenda {
    display: flex;
    gap: 16px;
    align-items: center;
    padding: 12px 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .ley-item { display: flex; align-items: center; gap: 6px; }
  .ley-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header { padding: 1rem; }
    main { padding: 1rem; }
    .logo { font-size: 1.4rem; }
    .tabs { padding: 0 1rem; }
  }

  .section { display: none; }
  .section.active { display: block; }

  .update-time {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    padding: 8px 1.5rem;
  }
</style>
</head>

</section>

<!-- PARTIDOS -->
<section id="tab-partidos" class="section">

  <div class="partidos-grid" id="partidos-grid"></div>
</section>

</main>

// ===== LÓGICA EN VIVO =====
function getMatchStatus(idx) {
  const p = partidos[idx];
  const now = Date.now();
  const kick = new Date(p.kickoff).getTime();
  const end  = kick + MATCH_DUR;
  // Resultado manual > resultado oficial > estado por tiempo
  const res = savedRes[`p${idx}`] || p.res;
  if (res) return { state:'fin', res };
  if (now >= kick && now < end) return { state:'live', min: Math.floor((now-kick)/60000) };
  if (now < kick) return { state:'pronto', kick };
  return { state:'sin-res' };
}

function getRes(idx) {
  const st = getMatchStatus(idx);
  return st.state === 'fin' ? st.res : null;
}

// ===== CÁLCULO PUNTOS =====
function calcPts(lp, vp, lr, vr) {
  if (lr===null||vr===null) return null;
  if (lp===lr && vp===vr) return 2;
  if (Math.sign(lr-vr)===Math.sign(lp-vp)) return 1;
  return 0;
}

  const ini = nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

// ===== RENDER FASE 3 =====
function renderFase3() {
  const thCols = partidos.map((p,i)=>{
    const st = getMatchStatus(i);
    let score, sc;
    if (st.state==='fin') { score=`${st.res[0]}-${st.res[1]}`; sc='var(--verde)'; }
    else if (st.state==='live') { score=`⚡${st.min}'`; sc='var(--rojo)'; }
    else { score='?-?'; sc='var(--muted)'; }
    return `<th style="text-align:center;min-width:66px;font-size:10px">${p.local.substring(0,5)}<br>${p.visit.substring(0,5)}<br><span style="color:${sc}">${score}</span></th>`;
  }).join('');
  document.getElementById('thead-fase3').innerHTML = `<tr><th>Jugador</th>${thCols}<th class="pts">F3</th><th class="pts">Total</th></tr>`;

  const rows = JUGADORES.map(n=>{
    const a = puntosAnteriores[n];
    const total = a.f1+a.f2+a.f3;
    const celdas = pronosticos[n]?.map((pro,i)=>{
      const res = getRes(i);
      const pts = res ? calcPts(pro[0],pro[1],res[0],res[1]) : null;
      let bg='';
      if (pts===2) bg='background:rgba(0,200,83,0.25);color:#00ff6a;font-weight:700';
      else if(pts===1) bg='background:rgba(255,214,0,0.2);color:#FFD600;font-weight:700';
      else if(pts===0) bg='background:rgba(255,23,68,0.15);color:#ff6b6b';
      return `<td style="text-align:center;font-size:12px;${bg}">${pro[0]}-${pro[1]}</td>`;
    }).join('')||'';
    return {total, html:`<tr>
      <td style="white-space:nowrap;font-weight:600;font-size:13px">${n}</td>${celdas}
      <td class="pts-cell" style="color:var(--verde);font-weight:700">${a.f3}</td>
      <td class="pts-cell"><div class="pts-total">${total}</div></td>
    </tr>`};
  }).sort((a,b)=>b.total-a.total);
  document.getElementById('tbody-fase3').innerHTML = rows.map(r=>r.html).join('');
}

// ===== LIVE BADGE & AUTO-REFRESH =====
function updateLiveBadge() {
  const now = Date.now();
  const live = partidos.some((p,i)=>{
    if (getRes(i)) return false;
    const kick = new Date(p.kickoff).getTime();
    return now>=kick && now<kick+MATCH_DUR;
  });
  const b = document.querySelector('.live-badge');
  if (b) b.style.display = live ? 'flex' : 'none';
}

function getRefreshMs() {
  const now = Date.now();
  for (let i=0;i<partidos.length;i++) {
    const kick=new Date(partidos[i].kickoff).getTime();
    const end=kick+MATCH_DUR;
    if (!getRes(i) && now>=kick && now<end) return 30000;
    if (!getRes(i) && kick>now && kick-now<2*3600000) return 5*60000;
  }
  return 10*60000;
}

let _timer;
function scheduleRefresh() {
  clearTimeout(_timer);
  _timer = setTimeout(()=>{ renderAll(); scheduleRefresh(); }, getRefreshMs());
}

let liveData = {}; // key: "LocalEN vs VisitEN" -> {homeScore, awayScore, status, minute}

// Función para normalizar nombre
function normEN(name) {
  // Normaliza variantes comunes
  const norm = {
    "Türkiye": "Türkiye", "Turkey": "Türkiye",
    "USA": "United States", "US": "United States",
    "South Korea": "South Korea", "Korea Republic": "South Korea",
    "Ivory Coast": "Côte d'Ivoire", "Cote d'Ivoire": "Côte d'Ivoire",
    "Czech Republic": "Czechia", "Czechia": "Czechia",
    "DR Congo": "DR Congo", "Congo DR": "DR Congo", "Democratic Republic of Congo": "DR Congo",
    "New Zealand": "New Zealand",
    "Bosnia & Herzegovina": "Bosnia and Herzegovina",
    "Cape Verde": "Cape Verde", "Cabo Verde": "Cape Verde",
    "Curacao": "Curaçao", "Curaçao": "Curaçao",
  };
  return norm[name] || name;
}

async function fetchLiveScores() {
  // Intentar con worldcup26.ir (sin key, gratis)
  const urls = [
    'https://worldcup26.ir/get/games',
  ];
  
  for (const url of urls) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 5000);
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) continue;
      const data = await res.json();
      
      // data puede ser un array de partidos
      const games = Array.isArray(data) ? data : (data.games || data.matches || data.data || []);
      
      liveData = {};
      games.forEach(g => {
        const home = normEN(g.home_team || g.homeTeam || g.home || '');
        const away = normEN(g.away_team || g.awayTeam || g.away || '');
        const status = (g.status || g.state || '').toUpperCase();
        const homeScore = g.home_score ?? g.homeScore ?? g.score_home ?? g.goals_home ?? null;
        const awayScore = g.away_score ?? g.awayScore ?? g.score_away ?? g.goals_away ?? null;
        const minute = g.minute || g.match_time || null;
        
        if (home && away) {
          const key = `${home}|${away}`;
          liveData[key] = { homeScore, awayScore, status, minute };
        }
      });
      
      console.log(`✅ API live: ${Object.keys(liveData).length} partidos cargados`);
      return true;
    } catch(e) {
      console.warn('API falló:', url, e.message);
    }
  }
  return false;
}

// Obtener resultado de API para un partido de la quiniela
function getAPIResult(idx) {
  const p = partidos[idx];
  const homeEN = normEN(TEAM_MAP[p.local] || p.local);
  const awayEN = normEN(TEAM_MAP[p.visit] || p.visit);
  const key = `${homeEN}|${awayEN}`;
  return liveData[key] || null;
}

// Override de getMatchStatus para usar datos de la API
const _originalGetMatchStatus = getMatchStatus;
function getMatchStatusLive(idx) {
  // 1. Resultado manual del usuario tiene prioridad
  if (savedRes[`p${idx}`]) return { state:'fin', res: savedRes[`p${idx}`] };
  
  // 2. Resultado fijo en el código
  if (partidos[idx].res) return { state:'fin', res: partidos[idx].res };
  
  // 3. Datos de la API en vivo
  const api = getAPIResult(idx);
  if (api) {
    const st = api.status;
    const hasScore = api.homeScore !== null && api.awayScore !== null;
    
    if (['FT','FINISHED','FULL_TIME','AET','PEN'].some(s => st.includes(s)) && hasScore) {
      return { state:'fin', res: [api.homeScore, api.awayScore] };
    }
    if (['LIVE','IN_PLAY','HT','1H','2H','ET'].some(s => st.includes(s))) {
      return { state:'live', min: api.minute || '?', homeScore: api.homeScore, awayScore: api.awayScore };
    }
  }
  
  // 4. Lógica por tiempo
  const now = Date.now();
  const kick = new Date(partidos[idx].kickoff).getTime();
  const end  = kick + MATCH_DUR;
  if (now >= kick && now < end) return { state:'live', min: Math.floor((now-kick)/60000), homeScore: null, awayScore: null };
  if (now < kick) return { state:'pronto', kick };
  return { state:'sin-res' };
}

// Sobreescribir la función getMatchStatus global
